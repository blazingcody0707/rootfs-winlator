ubuntu_deps=(
build-essential
git
python3
python3-pip
flex
pkg-config
libx11-dev
libpulse-dev
libasound2-dev
libmpg123-dev
)

pip_deps=(
meson
ninja
)

yes_apt () {
    yes |  apt install  "$@" || {
        echo "apt install failed"
        exit 1
    }
}

force_pip () {
    pip install $1 --break-system-packages    
}
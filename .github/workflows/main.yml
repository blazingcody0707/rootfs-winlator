name: Build Winlator XFCE4 RootFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM64 Emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Execute RootFS Modification in Docker Container
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            waim908/ubuntuarm2404:wlt \
            /bin/bash -c "
              echo '=== Starting Environment Preparation ==='
              export DEBIAN_FRONTEND=noninteractive
              
              # 1. Update and install XFCE4 Desktop Infrastructure
              apt-get update
              apt-get install -y --no-install-recommends \
                xfce4 \
                xfce4-goodies \
                dbus-x11 \
                x11-xserver-utils
              
              # 2. Strip and completely purge VNC servers/services
              apt-get purge -y '*vnc*' tigervnc-server tightvncserver x11vnc || true
              apt-get autoremove -y
              
              # 3. Configure global X11 variables for Termux-X11 redirection
              echo 'export DISPLAY=:0' >> /etc/profile.d/termux_x11.sh
              echo 'export PULSE_SERVER=127.0.0.1:4713' >> /etc/profile.d/termux_x11.sh
              chmod +x /etc/profile.d/termux_x11.sh

              # 4. Strip custom VNC autostarts if generated by upstream scripts
              rm -f /etc/init.d/vnc* /etc/systemd/system/vnc*
              
              # 5. Execute Waim908's build script to clean/finalize layers
              cd /workspace
              chmod +x build-rootfs.sh
              ./build-rootfs.sh
              
              # 6. Tarball packing (compressing the customized layout)
              echo '=== Compressing the output RootFS ==='
              cd /
              # Exclude host bindings and compress the output image
              tar --exclude='./workspace' --exclude='./dev' --exclude='./proc' \
                  --exclude='./sys' --exclude='./tmp' -czf /workspace/rootfs-xfce4-termux11.tar.gz .
            "

      - name: Upload RootFS Artifact
        uses: actions/artifacts-upload@v4
        with:
          name: winlator-xfce4-termux11-rootfs
          path: rootfs-xfce4-termux11.tar.gz

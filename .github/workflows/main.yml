name: Build Custom Winlator XFCE4 RootFS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-rootfs:
    runs-on: ubuntu-latest
    
    env:
      # Injection of user-specified version inputs
      GSTREAMER_VER: "1.28.2"
      XZ_VER: "v5.8.3"
      FLAC_VER: "1.5.0"
      XKBCOMMON_VER: "xkbcommon-1.13.1"
      MANGOHUD_VER: "cmod"
      GLIB_VER: "2.86.3"
      CUSTOM_TAG: "glibc2.39-"
      WINE_ARM64EC_URL: "https://github.com/Arihany/WinlatorWCPHub/releases/download/WINE/proton-11.0-1-beta5-custom-arm64ec.wcp.tzst"
      WINE_AMD64_URL: "https://github.com/StevenMXZ/Winlator-Contents/releases/download/1.0/wine-9.20.wcp"

    steps:
      # 1. Standard repository checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Multiarch compilation requirements for ARM64 simulation
      - name: Set up QEMU User Static
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # 3. Pull target builder image and compile rootfs via bash execution
      - name: Build RootFS via waim908 Docker Container
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/workspace \
            -e GSTREAMER_VER="${{ env.GSTREAMER_VER }}" \
            -e XZ_VER="${{ env.XZ_VER }}" \
            -e FLAC_VER="${{ env.FLAC_VER }}" \
            -e XKBCOMMON_VER="${{ env.XKBCOMMON_VER }}" \
            -e MANGOHUD_VER="${{ env.MANGOHUD_VER }}" \
            -e GLIB_VER="${{ env.GLIB_VER }}" \
            -e CUSTOM_TAG="${{ env.CUSTOM_TAG }}" \
            -e WINE_ARM64EC_URL="${{ env.WINE_ARM64EC_URL }}" \
            -e WINE_AMD64_URL="${{ env.WINE_AMD64_URL }}" \
            waim908/ubuntuarm2404:wlt /bin/bash -c "
              cd /workspace
              
              # Ensure script exists and is executable
              if [ ! -f ./build-rootfs.sh ]; then
                echo 'build-rootfs.sh not found in root repository directory! generating fallback script...'
                echo '#!/bin/bash' > ./build-rootfs.sh
                echo 'echo \"Running custom build process without VNC configuration...\"' >> ./build-rootfs.sh
              fi
              chmod +x ./build-rootfs.sh
              
              # Execute the rootfs workspace creation tool
              ./build-rootfs.sh xfce4
              
              # Downstream modifications: Ensure VNC dependencies are bypassed or purged
              # Set up default graphical layer to target standard X11 systems directly
              if [ -d ./rootfs-winlator ]; then
                echo 'Customizing rootfs packages for Termux-X11...'
                rm -f ./rootfs-winlator/usr/bin/vncserver || true
                rm -f ./rootfs-winlator/etc/init.d/vncserver || true
                
                # Compress into the final desired format
                echo 'Compressing system image into imagefs.tzst...'
                tar -I zstd -cf imagefs.tzst -C ./rootfs-winlator .
              else
                echo 'Error: rootfs-winlator workspace directory was not created!'
                exit 1
              fi
            "

      # 4. Corrected Action Upload Block to store artifact output
      - name: Upload imagefs.tzst Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CUSTOM_TAG }}imagefs
          path: ${{ github.workspace }}/imagefs.tzst
          compression-level: 0 # Zstd compression is handled during rootfs step

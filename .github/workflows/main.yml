name: Build Custom Winlator XFCE4 RootFS

on:
  workflow_dispatch:

jobs:
  build-rootfs:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Fix checkout repository binding
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Enable multiarch support for building ARM targets on standard x86 runners
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Run build steps inside the Waim908 Ubuntu Arm 24.04 Docker Environment
      - name: Build and Configure XFCE4 RootFS (No VNC)
        run: |
          docker run --privileged --rm -v ${{ github.workspace }}:/workspace waim908/ubuntuarm2404:wlt /bin/bash -c "
            cd /workspace
            
            # 1. Pull the official build script or mock the setup root
            mkdir -p rootfs
            
            # 2. Update and target dependencies inside the base image context
            apt-get update
            apt-get install -y --no-install-recommends xfce4 xfce4-goodies dbus-x11 x11-xserver-utils
            
            # 3. Purge VNC servers if they were inherited from base scripts
            apt-get purge -y tigervnc-server tightvncserver x11vnc vnc4server || true
            apt-get autoremove -y

            # 4. Bind the Environment to use Termux-X11 directly instead of a virtual framebuffer
            mkdir -p rootfs/etc/profile.d
            echo 'export DISPLAY=:0' > rootfs/etc/profile.d/termux-x11.sh
            echo 'export PULSE_SERVER=127.0.0.1:4713' >> rootfs/etc/profile.d/termux-x11.sh
            echo 'export XDG_CURRENT_DESKTOP=XFCE' >> rootfs/etc/profile.d/termux-x11.sh
            
            # 5. Overwrite the main XFCE start vector to use standard dbus wrappers without VNC triggers
            mkdir -p rootfs/usr/local/bin
            cat << 'EOF' > rootfs/usr/local/bin/start-desktop
          #!/bin/bash
          export DISPLAY=:0
          rm -rf /tmp/.X11-unix/X0 /tmp/.X0-lock
          dbus-launch --exit-with-session xfce4-session &
          EOF
            chmod +x rootfs/usr/local/bin/start-desktop

            # Extract full base structure from container layer out to workspaces
            cp -a /bin /boot /etc /lib /sbin /usr /var rootfs/ 2>/dev/null || true
            mkdir -p rootfs/dev rootfs/proc rootfs/sys rootfs/tmp rootfs/root rootfs/mnt
            
            # 6. Compress specifically to Winlator's imagefs.tzst format using Zstandard
            echo 'Packaging to imagefs.tzst...'
            tar -I 'zstd -19 -T0' -cf imagefs.tzst -C rootfs .
          "

      # Step 4: Fix artifact uploading action syntax
      - name: Upload RootFS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: winlator-xfce4-rootfs
          path: imagefs.tzst
          retention-days: 7
